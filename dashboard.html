<!DOCTYPE html>
<html>
<head>
  <title>Halaina Salon Dashboard</title>

  <link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
      margin:20px 0;
    }

#calendar{
  max-width:1400px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.dashboard-container{
  display:flex;
  gap:20px;
  max-width:1600px;
  margin:0 auto;
  align-items:flex-start;
}

.sidebar{
  width:250px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.main-calendar{
  flex:1;
  margin-top:-130px;
}

.fc-timegrid-slot {
  height: 40px !important;
}
#miniCalendar1,
#miniCalendar2,
#miniCalendar3{
  background:white;
  padding:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  min-height:180px;
}
</style>
</head>

<body>

<img src="salonlogo(1)(1).png" width="100%">


 


<div class="dashboard-container">

  <div class="sidebar">

<h3>Calendar</h3>



<button onclick="calendar.today()">Today</button>
    </div>



  </div>

  <div class="main-calendar">
    <div id="calendar"></div>
  </div>

<script>

document.addEventListener('DOMContentLoaded', function() {

  var calendarEl = document.getElementById('calendar');

var calendar = new FullCalendar.Calendar(calendarEl, {

  initialView: 'timeGridWeek',

hiddenDays: [0,6],

slotMinTime: '09:00:00',
slotMaxTime: '19:30:00',

slotDuration: '00:30:00',

height: 'auto',
expandRows: true,

slotLabelInterval: '00:30:00',

  headerToolbar: {
    left: 'prev,next today',
    center: 'title',
    right: 'timeGridDay,timeGridWeek,dayGridMonth'
  },

nowIndicator: false,
  editable: true,
  selectable: true,
  events: []

});

calendar.render();




});

</script>

</body>
</html>
