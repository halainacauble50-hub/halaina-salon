<!DOCTYPE html>
<html>
<head>
  <title>Halaina Salon Dashboard</title>

  <link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
      margin:20px 0;
    }

#calendar{
  max-width:1400px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.dashboard-container{
  display:flex;
  gap:30px;
  max-width:1800px;
  margin:0 auto;
  align-items:flex-start;
}

.sidebar{
  width:400px;
  background:transparent;
  padding:0;
  border-radius:0;
  box-shadow:none;
}

.main-calendar{
  flex:1;
}

.fc-timegrid-slot {
  height: 40px !important;
}
#miniCalendar1,
#miniCalendar2,
#miniCalendar3{
  background:white;
  padding:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  min-height:180px;
}
</style>
</head>

<body>

<img src="salonlogo(1)(1).png" width="100%">


 


<div class="dashboard-container">

  <div class="sidebar">

<div id="miniCalendar1"></div>
<br>

<div id="miniCalendar2"></div>
<br>

<div id="miniCalendar3"></div>







  </div>

  <div class="main-calendar">
    <div id="calendar"></div>
  </div>

<script>

document.addEventListener('DOMContentLoaded', function() {

  var calendarEl = document.getElementById('calendar');

var calendar = new FullCalendar.Calendar(calendarEl, {

  initialView: 'timeGridWeek',

hiddenDays: [0,6],

slotMinTime: '09:00:00',
slotMaxTime: '19:30:00',

slotDuration: '00:30:00',

height: 'auto',
expandRows: true,

slotLabelInterval: '00:30:00',

  headerToolbar: {
left: 'prev,next',
    center: 'title',
    right: 'timeGridDay,timeGridWeek,dayGridMonth'
  },

nowIndicator: false,
  editable: true,
  selectable: true,
  events: []

});

calendar.render();

document.getElementById('miniCalendar1').innerHTML = `
<h4 style="text-align:center;">June 2026</h4>
<table style="width:100%; text-align:center; border-collapse:collapse;">
<tr>
<th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th>
</tr>
<tr>
<td></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td>
</tr>
<tr>
<td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td>
</tr>
<tr>
<td>14</td><td style="cursor:pointer;color:#1d4f91;font-weight:bold;">15</td><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td>
</tr>
<tr>
<td>21</td><td>22</td><td>23</td><td>24</td><td>25</td><td>26</td><td>27</td>
</tr>
<tr>
<td>28</td><td>29</td><td>30</td><td></td><td></td><td></td><td></td>
</tr>
</table>
`;
document.getElementById('miniCalendar1').onclick = function(e){
  if(e.target.innerText === '15'){
    calendar.gotoDate('2026-06-15');
  }
};
document.getElementById('miniCalendar2').innerHTML =
'<h4 style="text-align:center;">July 2026</h4>';

document.getElementById('miniCalendar3').innerHTML =
'<h4 style="text-align:center;">August 2026</h4>';



});

</script>

</body>
</html>
