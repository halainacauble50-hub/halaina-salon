<!DOCTYPE html>
<html>
<head>
  <title>Halaina Salon Dashboard</title>

  <link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
      margin:20px 0;
    }

#calendar{
  max-width:1400px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.dashboard-container{
  display:flex;
  gap:30px;
  max-width:1800px;
  margin:0 auto;
  align-items:flex-start;
}

.sidebar{
  width:400px;
  background:transparent;
  padding:0;
  border-radius:0;
  box-shadow:none;
}

.main-calendar{
  flex:1;
}

.fc-timegrid-slot {
  height: 40px !important;
}
#miniCalendar1,
#miniCalendar2,
#miniCalendar3,
#miniCalendar4{
  background:white;
  padding:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  min-height:180px;
}

#miniCalendar1 td,
#miniCalendar2 td,
#miniCalendar3 td,
#miniCalendar4 td{
  padding: 3px;
  cursor: pointer;
}
    
</style>
</head>

<body>

<img src="salonlogo(1)(1).png" width="100%">


 


<div class="dashboard-container">

  <div class="sidebar">

<div id="miniCalendar1"></div>
<br>

<div id="miniCalendar2"></div>
<br>

<div id="miniCalendar3"></div>
<br>

<div id="miniCalendar4"></div>







  </div>

  <div class="main-calendar">
    <div id="calendar"></div>
  </div>

<script>

document.addEventListener('DOMContentLoaded', function() {

  var calendarEl = document.getElementById('calendar');

var calendar = new FullCalendar.Calendar(calendarEl, {

  initialView: 'timeGridWeek',

hiddenDays: [0,6],

slotMinTime: '09:00:00',
slotMaxTime: '19:30:00',

slotDuration: '00:30:00',

height: 'auto',
expandRows: true,

slotLabelInterval: '00:30:00',

  headerToolbar: {
left: 'prev,next',
    center: 'title',
    right: 'timeGridDay,timeGridWeek,dayGridMonth'
  },

nowIndicator: false,
  editable: true,
  eventClick: function(info){

  alert(
    'Appointment: ' + info.event.title +
    '\nStart: ' + info.event.start
  );

},
  selectable: true,
select: function(info) {

  window.selectedInfo = info;

  document.getElementById('createModal').style.display = 'block';

},



events: [
  {
    title: `Dr. John Smith
843-555-1234
123 Main St
MRI Follow-up`,
    start: '2026-06-18T13:30:00',
    end: '2026-06-18T15:30:00',
    display: 'block'
  }
]

});

calendar.render();
  document.getElementById('cancelBtn').onclick = function(){

  document.getElementById('createModal').style.display = 'none';

};

document.getElementById('appointmentBtn').onclick = function(){

  document.getElementById('createModal').style.display = 'none';

  let name = prompt('Client Name');
  if(!name) return;

  let phone = prompt('Phone Number');
  let email = prompt('Email');
  let notes = prompt('Notes');

  calendar.addEvent({
    title: name,
    start: window.selectedInfo.start,
    end: window.selectedInfo.end,

    extendedProps:{
      phone: phone,
      email: email,
      notes: notes
    }
  });

};

document.getElementById('blockBtn').onclick = function(){

  document.getElementById('createModal').style.display = 'none';

  let details = prompt('Enter Block Details');

  if(details){

    calendar.addEvent({
      title: details,
      start: window.selectedInfo.start,
      end: window.selectedInfo.end
    });

  }

};

  const day = e.target.innerText;

  calendar.gotoDate('2026-06-' + day.padStart(2,'0'));

</script>
<div id="createModal" style="
