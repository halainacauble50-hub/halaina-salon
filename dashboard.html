<!DOCTYPE html>
<html>
<head>
  <title>Halaina Salon Dashboard</title>

  <link rel="stylesheet" href="styles.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      background:#f5f5f5;
    }

    h1{
      text-align:center;
      margin:20px 0;
    }

#calendar{
  max-width:1400px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.dashboard-container{
  display:flex;
  gap:30px;
  max-width:1800px;
  margin:0 auto;
  align-items:flex-start;
}

.sidebar{
  width:400px;
  background:transparent;
  padding:0;
  border-radius:0;
  box-shadow:none;
}

.main-calendar{
  flex:1;
}

.fc-timegrid-slot {
  height: 40px !important;
}
#miniCalendar1,
#miniCalendar2,
#miniCalendar3,
#miniCalendar4{
  background:white;
  padding:8px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  min-height:180px;
}

#miniCalendar1 td,
#miniCalendar2 td,
#miniCalendar3 td,
#miniCalendar4 td{
  padding: 3px;
  cursor: pointer;
}
    
</style>
</head>

<body>

<img src="salonlogo(1)(1).png" width="100%">


 


<div class="dashboard-container">

  <div class="sidebar">

<div id="miniCalendar1"></div>
<br>

<div id="miniCalendar2"></div>
<br>

<div id="miniCalendar3"></div>
<br>

<div id="miniCalendar4"></div>







  </div>

  <div class="main-calendar">
    <div id="calendar"></div>
  </div>

<script>

document.addEventListener('DOMContentLoaded', function() {

  var calendarEl = document.getElementById('calendar');

var calendar = new FullCalendar.Calendar(calendarEl, {

  initialView: 'timeGridWeek',

hiddenDays: [0,6],

slotMinTime: '09:00:00',
slotMaxTime: '19:30:00',

slotDuration: '00:30:00',

height: 'auto',
expandRows: true,

slotLabelInterval: '00:30:00',

  headerToolbar: {
left: 'prev,next',
    center: 'title',
    right: 'timeGridDay,timeGridWeek,dayGridMonth'
  },

nowIndicator: false,
editable: true,

eventClick: function(info){

  window.selectedEvent = info.event;

  if(info.event.title.startsWith('BLOCKED:')){

  document.getElementById('viewPhone').innerText = '';
  document.getElementById('viewEmail').innerText = '';
  document.getElementById('viewService').innerText = '';
  document.getElementById('viewNotes').innerText = '';

} else {

  document.getElementById('viewPhone').innerText =
    'Phone: ' + (info.event.extendedProps.phone || '');

  document.getElementById('viewEmail').innerText =
    'Email: ' + (info.event.extendedProps.email || '');

  document.getElementById('viewService').innerText =
    'Service: ' + (info.event.extendedProps.service || '');

  document.getElementById('viewNotes').innerText =
    'Notes: ' + (info.event.extendedProps.notes || '');

}

  document.getElementById('viewModal').style.display = 'block';

},

selectable: true,
select: function(info) {

  window.selectedInfo = info;

  document.getElementById('appointmentModal').style.display = 'block';

},

events: []



});

calendar.render();

document.getElementById('closeAppointment').onclick = function(){

  document.getElementById('appointmentModal').style.display = 'none';

};
  document.getElementById('timeBlockBtn').onclick = function(){

  let details = prompt('Enter Block Details');

  if(details){

    calendar.addEvent({
      title: 'BLOCKED: ' + details,
      start: window.selectedInfo.start,
      end: window.selectedInfo.end,
      backgroundColor: '#666',
      borderColor: '#666'
    });

    document.getElementById('appointmentModal').style.display = 'none';
  }

};

document.getElementById('saveAppointment').onclick = function(){

  let client = document.getElementById('clientName').value;
  let phone = document.getElementById('clientPhone').value;
  let email = document.getElementById('clientEmail').value;
  let service = document.getElementById('serviceName').value;
  let notes = document.getElementById('appointmentNotes').value;

  calendar.addEvent({
    title: client,
    start: window.selectedInfo.start,
    end: window.selectedInfo.end,
    extendedProps:{
      phone: phone,
      email: email,
      service: service,
      notes: notes
    }
  });

document.getElementById('clientName').value = '';
document.getElementById('clientPhone').value = '';
document.getElementById('clientEmail').value = '';
document.getElementById('serviceName').value = '';
document.getElementById('appointmentNotes').value = '';

document.getElementById('appointmentModal').style.display = 'none';

};

  const day = e.target.innerText;

  if(!day || isNaN(day)) return;

  calendar.gotoDate('2026-06-' + day.padStart(2,'0'));
};

document.getElementById('miniCalendar4').onclick = function(e){

  let day = e.target.innerText;

  if(!isNaN(day) && day !== ''){
    calendar.gotoDate('2026-09-' + day.padStart(2,'0'));
  }

};



});


</script>


<div id="appointmentModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:10000;
">

<div style="
background:white;
width:500px;
margin:80px auto;
padding:20px;
border-radius:10px;
">

<h2>New Appointment</h2>

<input id="clientName"
placeholder="Client Name"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="clientPhone"
placeholder="Phone Number"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="clientEmail"
placeholder="Email"
style="width:100%;padding:10px;margin-bottom:10px;">

<input id="serviceName"
placeholder="Service"
style="width:100%;padding:10px;margin-bottom:10px;">

<textarea id="appointmentNotes"
placeholder="Notes"
style="width:100%;padding:10px;height:100px;margin-bottom:10px;"></textarea>

<button id="saveAppointment">
  Save
</button>

<button id="timeBlockBtn">
  Time Block
</button>

<button id="closeAppointment">
  Cancel
</button>

</div>
</div>
  <div id="viewModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
z-index:11000;
">

  <div style="
  background:white;
  width:400px;
  margin:100px auto;
  padding:20px;
  border-radius:10px;
  ">

    <h3 id="viewTitle"></h3>

    <p id="viewPhone"></p>
    <p id="viewEmail"></p>
    <p id="viewService"></p>
    <p id="viewNotes"></p>

    <button id="deleteEventBtn">
      Delete
    </button>

  <button id="closeViewBtn">
  Close
</button>

</div>

</div>

<script>

document.getElementById('deleteEventBtn').onclick = function(){

  if(window.selectedEvent){
    window.selectedEvent.remove();
  }

  document.getElementById('viewModal').style.display = 'none';

};

document.getElementById('closeViewBtn').onclick = function(){

  document.getElementById('viewModal').style.display = 'none';

};

</script>

</body>
</html>
