<h1>Book Appointment</h1>

<p>
Select your service and preferred appointment date.
</p>

<form>

<p>
<strong>Select Service</strong>
</p>

<select>

```
<option>Women's Haircut</option>
<option>Women's Haircut & Style</option>
<option>Men's Haircut</option>

<option>Color</option>
<option>Color & Cut</option>
<option>Color & Style</option>
<option>Color, Cut & Style</option>
<option>Brow Color</option>

<option>Partial Foils</option>
<option>Partial Foils & Cut</option>
<option>Partial Foils & Style</option>
<option>Partial Foils, Cut & Style</option>

<option>Full Foils</option>
<option>Full Foils & Cut</option>
<option>Full Foils & Style</option>
<option>Full Foils, Cut & Style</option>

<option>Perm</option>
<option>Perm & Cut</option>

<option>Relaxer</option>
<option>Relaxer & Cut</option>

<option>Shampoo & Style</option>

<option>Brow Wax</option>
<option>Lip Wax</option>
<option>Chin Wax</option>
<option>Sideburn Wax</option>
<option>Neck Wax</option>
```

</select>

<br><br>

<p>
<strong>Select Date</strong>
</p>

<input type="date">

<br><br>

<button type="button" onclick="showAvailability()">
Check Availability
</button>

<div id="availability"></div>

</form>
<script>
function showAvailability() {

    document.getElementById("availability").innerHTML = `

<h2>Available Times</h2>

<button type="button" onclick="selectTime('9:00 AM')">9:00 AM</button><br><br>

<button type="button" onclick="selectTime('11:00 AM')">11:00 AM</button><br><br>

<button type="button" onclick="selectTime('1:00 PM')">1:00 PM</button><br><br>

<button type="button" onclick="selectTime('3:00 PM')">3:00 PM</button><br><br>

<button type="button" onclick="selectTime('5:00 PM')">5:00 PM</button>

<div id="selectedTime"></div>

`;

}
   function selectTime(time) {

    document.getElementById("selectedTime").innerHTML = `

    <h3>Selected Time: ${time}</h3>

    <p>
    <strong>Name</strong><br>
    <input type="text">
    </p>

    <p>
    <strong>Phone</strong><br>
    <input type="tel">
    </p>

    <p>
    <strong>Email (optional)</strong><br>
    <input type="email">
    </p>

  <button type="button">
Request Appointment
</button>

`;

}
</script>
