<script>
const SUPABASE_URL = 'https://iodnevopnptslcosyysu.supabase.co';

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
    
function showAvailability() {

    document.getElementById("availability").innerHTML = `

<h2>Available Times</h2>
<div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;">

`;

}
   function selectTime(time) {

    document.getElementById("selectedTime").innerHTML = `

    <h3>Selected Time: ${time}</h3>

    <p>
    <strong>Name</strong><br>
<input type="text" id="clientName">
    </p>

    <p>
    <strong>Phone</strong><br>
  <input type="tel" id="clientPhone">
    </p>

    <p>
    <strong>Email (optional)</strong><br>
<input type="email" id="clientEmail">
    </p>

<button type="button" onclick="requestAppointment()">
Request Appointment
</button>

`;

}

async function requestAppointment() {

    const name = document.getElementById('clientName').value;
    const phone = document.getElementById('clientPhone').value;
    const email = document.getElementById('clientEmail').value;

    if (!name || !phone) {
        alert("Please enter your name and phone number.");
        return;
    }

const { error } = await supabaseClient
.from('appointments')
.insert([
{
    name: name,
    phone: phone,
    email: email,
    service: document.querySelector('select').value,
    appointment_date: document.querySelector('input[type="date"]').value,
    appointment_time: document.getElementById('selectedTime')
        .querySelector('h3')
        .innerText
        .replace('Selected Time: ', ''),
    status: 'Pending'
}
]);

if (error) {
alert('Error saving appointment.');
console.error(error);
return;
}

alert('Appointment request submitted successfully!');

document.getElementById('clientName').value = '';
document.getElementById('clientPhone').value = '';
document.getElementById('clientEmail').value = '';
}

</script>
